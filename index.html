<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyDoctor — Find & Book Doctors in Hyderabad</title>
    <style>
        :root {
            --green-dark   : #1a6b3c;
            --green-mid    : #2d9e5f;
            --green-light  : #e8f5ee;
            --green-pale   : #f4fbf7;
            --white        : #ffffff;
            --gray-100     : #f8f9fa;
            --gray-200     : #e9ecef;
            --gray-400     : #ced4da;
            --gray-600     : #6c757d;
            --gray-800     : #343a40;
            --red          : #dc3545;
            --shadow-sm    : 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md    : 0 8px 24px rgba(0,0,0,0.10);
            --shadow-card  : 0 2px 12px rgba(0,0,0,0.08);
            --radius       : 12px;
            --radius-sm    : 8px;
            --font         : 'Segoe UI', Arial, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body { font-family: var(--font); background: var(--gray-100); color: var(--gray-800); }

        /* ── Navbar ── */
        .navbar {
            background: var(--white); padding: 0 24px; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 100;
        }

        .nav-brand { display: flex; align-items: center; gap: 9px; text-decoration: none; }

        .nav-brand-icon {
            width: 34px; height: 34px; background: var(--green-mid);
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-size: 18px;
        }

        .nav-brand-name { font-size: 18px; font-weight: 700; color: var(--green-dark); }

        .nav-links { display: flex; align-items: center; gap: 8px; }

        .btn-nav {
            padding: 7px 16px; border-radius: 20px; font-size: 13px;
            font-weight: 600; cursor: pointer; font-family: var(--font);
            text-decoration: none; border: none; transition: all 0.2s;
        }

        .btn-nav-outline {
            background: var(--white); color: var(--green-dark);
            border: 1.5px solid var(--green-mid) !important;
        }

        .btn-nav-outline:hover { background: var(--green-light); }
        .btn-nav-solid  { background: var(--green-mid); color: var(--white); }
        .btn-nav-solid:hover { background: var(--green-dark); }

        /* ── Hero ── */
        .hero {
            background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 60%, #4db87a 100%);
            padding: 56px 24px 80px; text-align: center; position: relative; overflow: hidden;
        }

        .hero::before {
            content: ''; position: absolute; top: -100px; right: -100px;
            width: 400px; height: 400px; background: rgba(255,255,255,0.05); border-radius: 50%;
        }

        .hero::after {
            content: ''; position: absolute; bottom: -120px; left: -80px;
            width: 350px; height: 350px; background: rgba(255,255,255,0.04); border-radius: 50%;
        }

        .hero-content { position: relative; z-index: 1; }

        .hero-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.15); color: var(--white);
            padding: 5px 14px; border-radius: 20px; font-size: 12px;
            font-weight: 600; margin-bottom: 20px; backdrop-filter: blur(4px);
        }

        .hero-title {
            font-size: 40px; font-weight: 800; color: var(--white);
            line-height: 1.15; margin-bottom: 12px; letter-spacing: -0.5px;
        }

        .hero-title span { color: #a8f0c6; }
        .hero-sub { font-size: 16px; color: rgba(255,255,255,0.85); margin-bottom: 36px; }

        .search-box {
            background: var(--white); border-radius: var(--radius); padding: 8px;
            max-width: 700px; margin: 0 auto 20px; display: flex; gap: 8px;
            box-shadow: var(--shadow-md);
        }

        .search-input-wrap { flex: 1; position: relative; }

        .search-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%); font-size: 16px; pointer-events: none;
        }

        .search-input {
            width: 100%; padding: 11px 14px 11px 42px;
            border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
            font-size: 14px; color: var(--gray-800); font-family: var(--font);
            outline: none; transition: border-color 0.2s;
        }

        .search-input:focus { border-color: var(--green-mid); }

        .btn-search {
            padding: 11px 24px; background: var(--green-mid); color: var(--white);
            border: none; border-radius: var(--radius-sm); font-size: 14px;
            font-weight: 600; cursor: pointer; font-family: var(--font);
            white-space: nowrap; transition: background 0.2s;
        }

        .btn-search:hover { background: var(--green-dark); }

        .hero-stats { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; }

        .stat-item { color: var(--white); text-align: center; }
        .stat-number { font-size: 24px; font-weight: 800; display: block; }
        .stat-label  { font-size: 12px; color: rgba(255,255,255,0.75); }

        .section { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        .section-title { font-size: 20px; font-weight: 700; color: var(--gray-800); margin-bottom: 16px; }

        /* ── Spec Pills ── */
        .spec-section {
            background: var(--white); padding: 28px 0;
            margin-top: -24px; position: relative; z-index: 2;
        }

        .spec-pills { display: flex; gap: 10px; flex-wrap: wrap; }

        .spec-pill {
            padding: 8px 18px; background: var(--green-pale);
            border: 1.5px solid var(--green-light); border-radius: 20px;
            font-size: 13px; font-weight: 500; color: var(--green-dark);
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }

        .spec-pill:hover, .spec-pill.active {
            background: var(--green-mid); color: var(--white); border-color: var(--green-mid);
        }

        /* ── Hospitals Section ── */
        .hospitals-section { padding: 32px 0 48px; }

        .filter-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
        }

        .results-count { font-size: 14px; color: var(--gray-600); }
        .results-count strong { color: var(--gray-800); font-weight: 600; }

        .hospitals-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px;
        }

        /* ── Hospital Card ── */
        .hospital-card {
            background: var(--white); border-radius: var(--radius);
            box-shadow: var(--shadow-card); overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer; border: 1.5px solid transparent;
        }

        .hospital-card:hover {
            transform: translateY(-2px); box-shadow: var(--shadow-md);
            border-color: var(--green-light);
        }

        /* Card header band */
        .hospital-card-header {
            background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
            padding: 18px 20px 14px;
            display: flex; justify-content: space-between; align-items: flex-start;
        }

        .hospital-name { font-size: 16px; font-weight: 700; color: var(--white); margin-bottom: 3px; }
        .hospital-type { font-size: 11px; color: rgba(255,255,255,0.8); }

        .hospital-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

        .nabh-badge {
            background: rgba(255,255,255,0.2); color: var(--white);
            font-size: 10px; font-weight: 700; padding: 3px 8px;
            border-radius: 10px; white-space: nowrap;
        }

        .open-badge {
            font-size: 10px; font-weight: 700; padding: 3px 8px;
            border-radius: 10px; white-space: nowrap;
        }

        .open-badge.open   { background: #e8f5e9; color: #2e7d32; }
        .open-badge.closed { background: #fdecea; color: var(--red); }

        /* Card body */
        .hospital-card-body { padding: 16px 20px; }

        .hospital-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

        .hospital-tag {
            display: flex; align-items: center; gap: 4px;
            font-size: 12px; color: var(--gray-600);
            background: var(--gray-100); padding: 4px 10px; border-radius: 6px;
        }

        /* Stats row */
        .hospital-stats {
            display: grid; grid-template-columns: repeat(3,1fr);
            gap: 8px; margin-bottom: 12px;
        }

        .h-stat {
            text-align: center; background: var(--green-pale);
            border-radius: var(--radius-sm); padding: 8px 4px;
        }

        .h-stat-num   { font-size: 16px; font-weight: 700; color: var(--green-dark); }
        .h-stat-label { font-size: 10px; color: var(--gray-600); margin-top: 1px; }

        /* Insurance */
        .insurance-row {
            display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
        }

        .insurance-tag {
            font-size: 11px; color: var(--green-dark); background: var(--green-light);
            padding: 3px 8px; border-radius: 10px; white-space: nowrap;
        }

        /* Card footer */
        .hospital-card-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 12px; border-top: 1px solid var(--gray-200);
        }

        .wait-info { font-size: 12px; color: var(--gray-600); }
        .wait-info strong { color: var(--gray-800); }

        .btn-view {
            padding: 8px 20px; background: var(--green-mid); color: var(--white);
            border: none; border-radius: var(--radius-sm); font-size: 13px;
            font-weight: 600; cursor: pointer; font-family: var(--font);
            transition: background 0.2s;
        }

        .btn-view:hover { background: var(--green-dark); }

        /* ── Empty State ── */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-600); }
        .empty-state-icon  { font-size: 48px; margin-bottom: 16px; }
        .empty-state-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--gray-800); }
        .empty-state-sub   { font-size: 14px; }

        /* ── Skeleton ── */
        .skeleton {
            background: linear-gradient(90deg, var(--gray-200) 25%, var(--gray-100) 50%, var(--gray-200) 75%);
            background-size: 200% 100%; animation: skeleton-shimmer 1.2s infinite; border-radius: 6px;
        }

        @keyframes skeleton-shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── Loader ── */
        #bmd-loader {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(255,255,255,0.75);
            z-index: 9999; align-items: center; justify-content: center;
            flex-direction: column; gap: 12px;
        }

        .spinner {
            width: 40px; height: 40px; border: 4px solid var(--gray-200);
            border-top: 4px solid var(--green-mid); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #bmd-toast {
            position: fixed; bottom: 24px; right: 24px;
            padding: 12px 20px; border-radius: 8px; font-size: 14px;
            font-family: var(--font); color: var(--white);
            box-shadow: var(--shadow-md); z-index: 99999; display: none;
        }

        @media (max-width: 600px) {
            .hero-title    { font-size: 28px; }
            .search-box    { flex-direction: column; }
            .hero-stats    { gap: 20px; }
            .stat-number   { font-size: 20px; }
            .hospitals-grid{ grid-template-columns: 1fr; }
            .filter-row    { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div id="bmd-loader">
    <div class="spinner"></div>
    <span style="color:var(--green-mid);font-size:14px;">Loading...</span>
</div>

<div id="bmd-toast"></div>

<!-- Navbar -->
<nav class="navbar">
    <a href="index.html" class="nav-brand">
        <div class="nav-brand-icon">🏥</div>
        <span class="nav-brand-name">BookMyDoctor</span>
    </a>
    <div class="nav-links" id="nav-links"></div>
</nav>

<!-- Hero -->
<section class="hero">
    <div class="hero-content">
        <div class="hero-badge">🌿 Hyderabad's Trusted Health Platform</div>
        <h1 class="hero-title">
            Find a Hospital,<br>
            <span>Book a Doctor.</span>
        </h1>
        <p class="hero-sub">Search top hospitals near you — see doctors, insurance & availability.</p>

        <div class="search-box">
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" class="search-input"
                    placeholder="Search hospital or doctor name..."
                    oninput="filterHospitals()">
            </div>
            <button class="btn-search" onclick="filterHospitals()">Search</button>
        </div>

        <div class="hero-stats">
            <div class="stat-item">
                <span class="stat-number" id="stat-doctors">—</span>
                <span class="stat-label">Doctors</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="stat-patients">—</span>
                <span class="stat-label">Patients</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="stat-appointments">—</span>
                <span class="stat-label">Appointments</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="stat-rating">—</span>
                <span class="stat-label">Avg Rating</span>
            </div>
        </div>
    </div>
</section>

<!-- Specialization Pills -->
<div class="spec-section">
    <div class="section">
        <div class="spec-pills" id="spec-pills">
            <div class="spec-pill active" onclick="selectSpec('', this)">All</div>
        </div>
    </div>
</div>

<!-- Hospitals -->
<div class="hospitals-section">
    <div class="section">
        <div class="filter-row">
            <div class="section-title">Hospitals Near You</div>
            <div class="results-count" id="results-count"></div>
        </div>
        <div class="hospitals-grid" id="hospitals-grid">
            <!-- Skeleton -->
            <div class="hospital-card">
                <div style="background:var(--gray-200);height:80px;"></div>
                <div style="padding:16px 20px;">
                    <div class="skeleton" style="height:14px;width:60%;margin-bottom:10px;"></div>
                    <div class="skeleton" style="height:12px;width:80%;margin-bottom:10px;"></div>
                    <div class="skeleton" style="height:36px;width:100%;border-radius:8px;"></div>
                </div>
            </div>
            <div class="hospital-card">
                <div style="background:var(--gray-200);height:80px;"></div>
                <div style="padding:16px 20px;">
                    <div class="skeleton" style="height:14px;width:60%;margin-bottom:10px;"></div>
                    <div class="skeleton" style="height:12px;width:80%;margin-bottom:10px;"></div>
                    <div class="skeleton" style="height:36px;width:100%;border-radius:8px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ─────────────────────────────────────────────────────
//  Config
// ─────────────────────────────────────────────────────
const BASE_URL    = 'https://bookmydoctor-proxy.pulipraveenkumar08.workers.dev/';
let allHospitals  = [];
let selectedSpec  = '';

// ─────────────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────────────
function showLoader() { document.getElementById('bmd-loader').style.display = 'flex'; }
function hideLoader() { document.getElementById('bmd-loader').style.display = 'none'; }

function showToast(msg, color) {
    const t = document.getElementById('bmd-toast');
    t.textContent = msg; t.style.background = color || '#2d9e5f';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

async function callBMD(endpoint, payload) {
    try {
        const res  = await fetch(BASE_URL + endpoint, {
            method  : 'POST',
            headers : { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body    : JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.p_message) return JSON.parse(data.p_message);
        if (data.p_result)  return JSON.parse(data.p_result);
        return data;
    } catch (err) {
        console.error('API Error:', err);
        return { status: 'ERROR', message: err.message };
    }
}

function getSession() {
    return {
        token     : localStorage.getItem('bmd_token'),
        user_type : localStorage.getItem('bmd_user_type'),
        user_id   : localStorage.getItem('bmd_user_id'),
        name      : localStorage.getItem('bmd_name')
    };
}

// ─────────────────────────────────────────────────────
//  Navbar
// ─────────────────────────────────────────────────────
function renderNav() {
    const s   = getSession();
    const nav = document.getElementById('nav-links');

    if (s.token && s.user_type === 'PATIENT') {
        nav.innerHTML = `
            <a href="patient/appointments.html" class="btn-nav btn-nav-outline">My Appointments</a>
            <a href="patient/profile.html"      class="btn-nav btn-nav-outline">👤 Profile</a>
            <button class="btn-nav btn-nav-solid" onclick="handleLogout()">Logout</button>`;
    } else if (s.token && s.user_type === 'DOCTOR') {
        nav.innerHTML = `
            <a href="doctor/dashboard.html" class="btn-nav btn-nav-solid">Doctor Dashboard</a>`;
    } else if (s.token && s.user_type === 'ADMIN') {
        nav.innerHTML = `
            <a href="admin/dashboard.html" class="btn-nav btn-nav-solid">Admin Dashboard</a>`;
    } else {
        nav.innerHTML = `
            <a href="patient/login.html"    class="btn-nav btn-nav-outline">Sign In</a>
            <a href="patient/register.html" class="btn-nav btn-nav-solid">Get Started</a>`;
    }
}

async function handleLogout() {
    const s = getSession();
    if (s.token) await callBMD('logout', { session_token: s.token });
    localStorage.clear();
    renderNav();
    showToast('Logged out successfully');
}

// ─────────────────────────────────────────────────────
//  Load Analytics
// ─────────────────────────────────────────────────────
async function loadAnalytics() {
    const s    = getSession();
    const data = await callBMD('get-analytics', { session_token: s.token || '' });
    if (data.status === 'SUCCESS') {
        document.getElementById('stat-doctors').textContent      = data.total_doctors      || '0';
        document.getElementById('stat-patients').textContent     = data.total_patients     || '0';
        document.getElementById('stat-appointments').textContent = data.total_appointments || '0';
        document.getElementById('stat-rating').textContent       = data.avg_rating
            ? '⭐ ' + parseFloat(data.avg_rating).toFixed(1) : '⭐ New';
    }
}

// ─────────────────────────────────────────────────────
//  Load Specializations
// ─────────────────────────────────────────────────────
async function loadSpecializations() {
    const data = await callBMD('get-lookups', { lookup_type: 'BMD_SPECIALIZATION' });
    if (data.status === 'SUCCESS') {
        const pills = document.getElementById('spec-pills');
        data.lookups.forEach(l => {
            const pill     = document.createElement('div');
            pill.className = 'spec-pill';
            pill.textContent = l.meaning;
            pill.onclick   = () => selectSpec(l.code, pill);
            pills.appendChild(pill);
        });
    }
}

// ─────────────────────────────────────────────────────
//  Load Hospitals
// ─────────────────────────────────────────────────────
async function loadHospitals() {
    const s    = getSession();
    const data = await callBMD('get-hospitals', { session_token: s.token || '' });

    if (data.status === 'SUCCESS') {
        allHospitals = data.hospitals || [];
        renderHospitals(allHospitals);
    } else {
        document.getElementById('hospitals-grid').innerHTML = `
            <div class="empty-state" style="grid-column:1/-1;">
                <div class="empty-state-icon">⚠️</div>
                <div class="empty-state-title">Could not load hospitals</div>
                <div class="empty-state-sub">${data.message}</div>
            </div>`;
    }
}

// ─────────────────────────────────────────────────────
//  Check if hospital is open now
// ─────────────────────────────────────────────────────
function isOpen(openTime, closeTime) {
    try {
        const now   = new Date();
        const [oh, om] = openTime.split(':').map(Number);
        const [ch, cm] = closeTime.split(':').map(Number);
        const nowMins   = now.getHours() * 60 + now.getMinutes();
        const openMins  = oh * 60 + om;
        const closeMins = ch * 60 + cm;
        return nowMins >= openMins && nowMins <= closeMins;
    } catch(e) { return true; }
}

// ─────────────────────────────────────────────────────
//  Render Hospital Cards
// ─────────────────────────────────────────────────────
function renderHospitals(hospitals) {
    const grid  = document.getElementById('hospitals-grid');
    const count = document.getElementById('results-count');

    count.innerHTML = `Showing <strong>${hospitals.length}</strong> hospital${hospitals.length !== 1 ? 's' : ''}`;

    if (hospitals.length === 0) {
        grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1;">
                <div class="empty-state-icon">🔍</div>
                <div class="empty-state-title">No hospitals found</div>
                <div class="empty-state-sub">Try a different search term.</div>
            </div>`;
        return;
    }

    grid.innerHTML = hospitals.map(h => {
        const open       = isOpen(h.open_time || '08:00', h.close_time || '20:00');
        const nabh       = h.nabh_certified === 'Y';
        const rating     = parseFloat(h.avg_rating || 0);
        const insurance  = (h.insurance || []).slice(0,3);

        return `
        <div class="hospital-card" onclick="goToHospital(${h.hospital_id})">

            <div class="hospital-card-header">
                <div>
                    <div class="hospital-name">🏥 ${h.hospital_name}</div>
                    <div class="hospital-type">${h.hospital_type || 'Multi-Specialty'}</div>
                </div>
                <div class="hospital-badges">
                    ${nabh ? `<span class="nabh-badge">NABH ✓</span>` : ''}
                    <span class="open-badge ${open ? 'open' : 'closed'}">
                        ${open ? '● Open' : '● Closed'}
                    </span>
                </div>
            </div>

            <div class="hospital-card-body">

                <div class="hospital-meta">
                    <div class="hospital-tag">📍 ${h.city || 'Hyderabad'}</div>
                    <div class="hospital-tag">🕐 ${h.open_time || '08:00'} – ${h.close_time || '20:00'}</div>
                    ${rating > 0
                        ? `<div class="hospital-tag">⭐ ${rating.toFixed(1)}</div>`
                        : `<div class="hospital-tag">⭐ New</div>`}
                </div>

                <div class="hospital-stats">
                    <div class="h-stat">
                        <div class="h-stat-num">${h.doctor_count || 0}</div>
                        <div class="h-stat-label">Doctors</div>
                    </div>
                    <div class="h-stat">
                        <div class="h-stat-num">${h.dept_count || 0}</div>
                        <div class="h-stat-label">Departments</div>
                    </div>
                    <div class="h-stat">
                        <div class="h-stat-num">${h.avg_wait_mins || 15} min</div>
                        <div class="h-stat-label">Avg Wait</div>
                    </div>
                </div>

                ${insurance.length > 0 ? `
                <div class="insurance-row">
                    ${insurance.map(i => `<span class="insurance-tag">✓ ${i}</span>`).join('')}
                    ${(h.insurance||[]).length > 3 ? `<span class="insurance-tag">+${h.insurance.length-3} more</span>` : ''}
                </div>` : ''}

                <div class="hospital-card-footer">
                    <div class="wait-info">
                        📞 ${h.contact_phone || '—'}
                    </div>
                    <button class="btn-view"
                        onclick="event.stopPropagation(); goToHospital(${h.hospital_id})">
                        View Doctors →
                    </button>
                </div>

            </div>
        </div>`;
    }).join('');
}

// ─────────────────────────────────────────────────────
//  Filter Hospitals
// ─────────────────────────────────────────────────────
function filterHospitals() {
    const search = document.getElementById('search-input').value.trim().toLowerCase();

    const filtered = allHospitals.filter(h => {
        return !search ||
            (h.hospital_name  || '').toLowerCase().includes(search) ||
            (h.city           || '').toLowerCase().includes(search) ||
            (h.hospital_type  || '').toLowerCase().includes(search) ||
            (h.insurance || []).some(i => i.toLowerCase().includes(search));
    });

    renderHospitals(filtered);
}

// ─────────────────────────────────────────────────────
//  Specialization pill — filter by spec
//  (shows hospitals that have doctors in that spec)
// ─────────────────────────────────────────────────────
function selectSpec(code, pillEl) {
    selectedSpec = code;
    document.querySelectorAll('.spec-pill').forEach(p => p.classList.remove('active'));
    if (pillEl) pillEl.classList.add('active');

    if (!code) {
        renderHospitals(allHospitals);
        return;
    }

    // Show only hospitals that have doctors with this specialization
    const filtered = allHospitals.filter(h =>
        (h.specializations || []).some(s =>
            s.toUpperCase() === code.toUpperCase()
        )
    );

    if (filtered.length === 0) {
        showToast('No hospitals found for this specialization', '#fd7e14');
        renderHospitals([]);
    } else {
        renderHospitals(filtered);
    }
}
// ─────────────────────────────────────────────────────
//  Navigate
// ─────────────────────────────────────────────────────
function goToHospital(hospital_id) {
    window.location.href = 'hospital.html?hospital_id=' + hospital_id;
}

// ─────────────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────────────
async function init() {
    showLoader();
    renderNav();
    await Promise.all([
        loadAnalytics(),
        loadSpecializations(),
        loadHospitals()
    ]);
    hideLoader();
}

init();
</script>
