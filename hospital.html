<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital — BookMyDoctor</title>
    <style>
        :root {
            --green-dark  : #1a6b3c;
            --green-mid   : #2d9e5f;
            --green-light : #e8f5ee;
            --green-pale  : #f4fbf7;
            --white       : #ffffff;
            --gray-100    : #f8f9fa;
            --gray-200    : #e9ecef;
            --gray-400    : #ced4da;
            --gray-600    : #6c757d;
            --gray-800    : #343a40;
            --red         : #dc3545;
            --shadow-sm   : 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md   : 0 4px 20px rgba(0,0,0,0.12);
            --radius      : 12px;
            --radius-sm   : 8px;
            --font        : 'Segoe UI', Arial, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font); background: var(--gray-100); color: var(--gray-800); }

        /* ── Navbar ── */
        .navbar {
            background: var(--white); padding: 0 24px; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 100;
        }
        .nav-brand { display: flex; align-items: center; gap: 9px; text-decoration: none; flex-shrink: 0; }
        .nav-brand-icon {
            width: 34px; height: 34px; background: var(--green-mid);
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-size: 18px; flex-shrink: 0;
        }
        .nav-brand-name { font-size: 18px; font-weight: 700; color: var(--green-dark); }
        .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .nav-back {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; color: var(--gray-600); text-decoration: none;
            padding: 6px 12px; border-radius: 6px; transition: background 0.2s; white-space: nowrap;
        }
        .nav-back:hover { background: var(--gray-100); }
        .btn-nav {
            padding: 7px 14px; border-radius: 20px; font-size: 13px;
            font-weight: 600; cursor: pointer; font-family: var(--font);
            text-decoration: none; border: none; transition: all 0.2s; white-space: nowrap;
        }
        .btn-nav-outline { background: var(--white); color: var(--green-dark); border: 1.5px solid var(--green-mid) !important; }
        .btn-nav-outline:hover { background: var(--green-light); }
        .btn-nav-solid { background: var(--green-mid); color: var(--white); }
        .btn-nav-solid:hover { background: var(--green-dark); }

        /* ── Hero ── */
        .hospital-hero {
            background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
            padding: 32px 24px 40px;
        }
        .hospital-hero-inner { max-width: 1000px; margin: 0 auto; }
        .hospital-hero-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; }
        .hospital-hero-name { font-size: 28px; font-weight: 800; color: var(--white); margin-bottom: 6px; }
        .hospital-hero-type { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 12px; }
        .hero-badges { display: flex; gap: 8px; flex-wrap: wrap; }
        .hero-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 12px; white-space: nowrap; }
        .badge-nabh  { background: rgba(255,255,255,0.2); color: var(--white); }
        .badge-open  { background: #e8f5e9; color: #2e7d32; }
        .badge-closed{ background: #fdecea; color: var(--red); }
        .badge-type  { background: rgba(255,255,255,0.15); color: var(--white); }
        .hero-stats  { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
        .hero-stat   { background: rgba(255,255,255,0.15); border-radius: var(--radius-sm); padding: 12px 16px; text-align: center; min-width: 80px; }
        .hero-stat-num   { font-size: 20px; font-weight: 800; color: var(--white); }
        .hero-stat-label { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 2px; }

        /* ── Layout ── */
        .page-wrap {
            max-width: 1000px; margin: 0 auto;
            padding: 28px 24px 48px;
            display: grid; grid-template-columns: 1fr 300px;
            gap: 24px; align-items: start;
        }

        .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 20px; }
        .card-head { padding: 16px 20px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; gap: 10px; }
        .card-head-icon { width: 32px; height: 32px; background: var(--green-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .card-head-title { font-size: 15px; font-weight: 700; color: var(--gray-800); }
        .card-body { padding: 20px; }

        .dept-pills { display: flex; gap: 8px; flex-wrap: wrap; }
        .dept-pill {
            padding: 8px 16px; background: var(--green-pale);
            border: 1.5px solid var(--green-light); border-radius: 20px;
            font-size: 13px; font-weight: 500; color: var(--green-dark);
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .dept-pill:hover, .dept-pill.active { background: var(--green-mid); color: var(--white); border-color: var(--green-mid); }
        .dept-count { display: inline-block; background: var(--green-light); color: var(--green-dark); font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; margin-left: 4px; }
        .dept-pill.active .dept-count { background: rgba(255,255,255,0.25); color: var(--white); }

        .doctors-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }

        .doctor-card {
            background: var(--white); border-radius: var(--radius);
            box-shadow: var(--shadow-sm); padding: 16px 20px;
            border: 1.5px solid transparent; transition: all 0.2s;
            cursor: pointer; display: flex; gap: 14px; align-items: flex-start;
        }
        .doctor-card:hover { border-color: var(--green-light); transform: translateY(-1px); }
        .doctor-avatar { width: 56px; height: 56px; border-radius: 12px; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
        .doctor-info   { flex: 1; min-width: 0; }
        .doctor-name   { font-size: 15px; font-weight: 700; color: var(--gray-800); margin-bottom: 3px; }
        .doctor-spec   { font-size: 12px; color: var(--green-mid); font-weight: 600; margin-bottom: 4px; }
        .doctor-qual   { font-size: 11px; color: var(--gray-600); margin-bottom: 8px; }
        .doctor-tags   { display: flex; gap: 6px; flex-wrap: wrap; }
        .doctor-tag    { font-size: 11px; color: var(--gray-600); background: var(--gray-100); padding: 3px 8px; border-radius: 6px; }
        .avail-badge   { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
        .avail-badge.yes { background: #e8f5e9; color: #2e7d32; }
        .avail-badge.no  { background: #fdecea; color: #c62828; }
        .doctor-right  { text-align: right; flex-shrink: 0; }
        .doctor-fee    { font-size: 18px; font-weight: 700; color: var(--green-dark); }
        .doctor-fee small { font-size: 11px; font-weight: 400; color: var(--gray-600); }
        .doctor-rating { font-size: 12px; color: #f59e0b; margin-bottom: 10px; }
        .btn-book { padding: 8px 18px; background: var(--green-mid); color: var(--white); border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: background 0.2s; white-space: nowrap; }
        .btn-book:hover { background: var(--green-dark); }

        .sidebar { position: sticky; top: 80px; }
        .info-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--gray-200); font-size: 13px; }
        .info-row:last-child { border-bottom: none; }
        .info-icon  { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
        .info-label { font-size: 11px; color: var(--gray-600); margin-bottom: 2px; }
        .info-value { font-weight: 500; color: var(--gray-800); }
        .insurance-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
        .ins-tag { font-size: 11px; color: var(--green-dark); background: var(--green-light); padding: 3px 8px; border-radius: 10px; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--gray-600); }
        .empty-icon  { font-size: 40px; margin-bottom: 12px; }
        .empty-title { font-size: 16px; font-weight: 600; color: var(--gray-800); margin-bottom: 6px; }
        .empty-sub   { font-size: 13px; }

        .skeleton { background: linear-gradient(90deg, var(--gray-200) 25%, var(--gray-100) 50%, var(--gray-200) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 6px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        #bmd-loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.75); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--gray-200); border-top: 4px solid var(--green-mid); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #bmd-toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-family: var(--font); color: var(--white); box-shadow: var(--shadow-md); z-index: 99999; display: none; }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .page-wrap { grid-template-columns: 1fr; }
            .sidebar { position: static; }
        }

        @media (max-width: 480px) {
            .navbar { padding: 0 12px; height: 56px; }
            .nav-brand-name { font-size: 15px; }
            .nav-brand-icon { width: 28px; height: 28px; font-size: 15px; }
            .nav-back { font-size: 11px; padding: 4px 6px; }
            .btn-nav { padding: 5px 10px; font-size: 12px; }
            .btn-nav-hide-mobile { display: none; }
            .hospital-hero-name { font-size: 20px; }
            .hero-stats { gap: 8px; }
            .hero-stat { padding: 10px 12px; min-width: 70px; }
            .hero-stat-num { font-size: 17px; }
            .doctor-card { flex-wrap: wrap; }
            .doctor-right { width: 100%; display: flex; align-items: center; justify-content: space-between; text-align: left; margin-top: 8px; }
            .page-wrap { padding: 16px; }
        }
    </style>
</head>
<body>

<div id="bmd-loader">
    <div class="spinner"></div>
    <span style="color:var(--green-mid);font-size:14px;" id="loader-text">Loading...</span>
</div>
<div id="bmd-toast"></div>

<nav class="navbar">
    <a href="index.html" class="nav-brand">
        <div class="nav-brand-icon">🏥</div>
        <span class="nav-brand-name">BookMyDoctor</span>
    </a>
    <div class="nav-right">
        <a href="index.html" class="nav-back">← Back to Hospitals</a>
        <div id="nav-links"></div>
    </div>
</nav>

<div class="hospital-hero">
    <div class="hospital-hero-inner">
        <div class="hospital-hero-top">
            <div>
                <div class="hospital-hero-name" id="hero-name">Loading...</div>
                <div class="hospital-hero-type" id="hero-type"></div>
                <div class="hero-badges" id="hero-badges"></div>
            </div>
        </div>
        <div class="hero-stats" id="hero-stats"></div>
    </div>
</div>

<div class="page-wrap">
    <div>
        <div class="card">
            <div class="card-head">
                <div class="card-head-icon">🏬</div>
                <div class="card-head-title">Departments</div>
            </div>
            <div class="card-body">
                <div class="dept-pills" id="dept-pills">
                    <div class="dept-pill active" onclick="filterByDept('', '', this)">All Departments</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-head">
                <div class="card-head-icon">👨‍⚕️</div>
                <div class="card-head-title" id="doctors-title">Available Doctors</div>
            </div>
            <div class="card-body">
                <div class="doctors-grid" id="doctors-grid">
                    <div class="doctor-card">
                        <div class="skeleton" style="width:56px;height:56px;border-radius:12px;flex-shrink:0;"></div>
                        <div style="flex:1;">
                            <div class="skeleton" style="height:16px;width:60%;margin-bottom:8px;"></div>
                            <div class="skeleton" style="height:12px;width:40%;margin-bottom:6px;"></div>
                            <div class="skeleton" style="height:12px;width:80%;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="card">
            <div class="card-head">
                <div class="card-head-icon">ℹ️</div>
                <div class="card-head-title">Hospital Info</div>
            </div>
            <div class="card-body" id="hospital-info">
                <div class="skeleton" style="height:14px;width:80%;margin-bottom:10px;"></div>
                <div class="skeleton" style="height:14px;width:60%;margin-bottom:10px;"></div>
                <div class="skeleton" style="height:14px;width:70%;"></div>
            </div>
        </div>
        <div class="card" id="insurance-card" style="display:none;">
            <div class="card-head">
                <div class="card-head-icon">🛡️</div>
                <div class="card-head-title">Insurance Accepted</div>
            </div>
            <div class="card-body">
                <div class="insurance-list" id="insurance-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
const BASE_URL  = 'https://bookmydoctor-proxy.pulipraveenkumar08.workers.dev/';
let hospitalData = null;
let allDoctors   = [];
let hospitalId   = null;

function showLoader(msg) { document.getElementById('loader-text').textContent = msg || 'Loading...'; document.getElementById('bmd-loader').style.display = 'flex'; }
function hideLoader()    { document.getElementById('bmd-loader').style.display = 'none'; }

function showToast(msg, color) {
    const t = document.getElementById('bmd-toast');
    t.textContent = msg; t.style.background = color || '#2d9e5f';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

function getSession() {
    return {
        token    : localStorage.getItem('bmd_token'),
        userType : localStorage.getItem('bmd_user_type'),
        name     : localStorage.getItem('bmd_name')
    };
}

async function callBMD(endpoint, payload) {
    try {
        const res  = await fetch(BASE_URL + endpoint, {
            method  : 'POST',
            headers : { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body    : JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.p_message) return JSON.parse(data.p_message);
        if (data.p_result)  return JSON.parse(data.p_result);
        return data;
    } catch (err) { return { status: 'ERROR', message: err.message }; }
}

function isOpen(openTime, closeTime) {
    try {
        const now      = new Date();
        const [oh, om] = openTime.split(':').map(Number);
        const [ch, cm] = closeTime.split(':').map(Number);
        const nowMins  = now.getHours() * 60 + now.getMinutes();
        return nowMins >= (oh*60+om) && nowMins <= (ch*60+cm);
    } catch(e) { return true; }
}

function renderNav() {
    const s   = getSession();
    const nav = document.getElementById('nav-links');
    if (s.token && s.userType === 'PATIENT') {
        nav.innerHTML = `
            <a href="patient/appointments.html" class="btn-nav btn-nav-outline btn-nav-hide-mobile">My Appointments</a>
            <button class="btn-nav btn-nav-solid" onclick="handleLogout()">Logout</button>`;
    } else if (!s.token) {
        nav.innerHTML = `
            <a href="patient/login.html"    class="btn-nav btn-nav-outline btn-nav-hide-mobile">Sign In</a>
            <a href="patient/register.html" class="btn-nav btn-nav-solid">Get Started</a>`;
    }
}

async function handleLogout() {
    const s = getSession();
    if (s.token) await callBMD('logout', { session_token: s.token });
    localStorage.clear();
    window.location.href = 'patient/login.html';
}

async function loadHospital() {
    const s    = getSession();
    const data = await callBMD('get-hospitals', { session_token: s.token || '' });
    if (data.status !== 'SUCCESS') return;

    const hospital = (data.hospitals || []).find(h => h.hospital_id == hospitalId);
    if (!hospital) { document.getElementById('hero-name').textContent = 'Hospital not found'; return; }

    hospitalData = hospital;
    document.title = hospital.hospital_name + ' — BookMyDoctor';
    document.getElementById('hero-name').textContent = '🏥 ' + hospital.hospital_name;
    document.getElementById('hero-type').textContent = hospital.hospital_type || 'Multi-Specialty';

    const open = isOpen(hospital.open_time || '08:00', hospital.close_time || '20:00');
    document.getElementById('hero-badges').innerHTML = `
        ${hospital.nabh_certified === 'Y' ? `<span class="hero-badge badge-nabh">NABH ✓</span>` : ''}
        <span class="hero-badge ${open ? 'badge-open' : 'badge-closed'}">${open ? '● Open Now' : '● Closed'}</span>
        <span class="hero-badge badge-type">${hospital.city || 'Hyderabad'}</span>
    `;

    document.getElementById('hero-stats').innerHTML = `
        <div class="hero-stat"><div class="hero-stat-num">${hospital.doctor_count || 0}</div><div class="hero-stat-label">Doctors</div></div>
        <div class="hero-stat"><div class="hero-stat-num">${hospital.dept_count || 0}</div><div class="hero-stat-label">Departments</div></div>
        <div class="hero-stat"><div class="hero-stat-num">${hospital.avg_wait_mins || 15} min</div><div class="hero-stat-label">Avg Wait</div></div>
        <div class="hero-stat"><div class="hero-stat-num">${hospital.total_appts || 0}</div><div class="hero-stat-label">Consultations</div></div>
        <div class="hero-stat"><div class="hero-stat-num">⭐ ${parseFloat(hospital.avg_rating || 0).toFixed(1)}</div><div class="hero-stat-label">Rating</div></div>
    `;

    document.getElementById('hospital-info').innerHTML = `
        <div class="info-row"><span class="info-icon">📍</span><div><div class="info-label">Address</div><div class="info-value">${hospital.city || '—'}, ${hospital.state || '—'}</div></div></div>
        <div class="info-row"><span class="info-icon">📞</span><div><div class="info-label">Contact</div><div class="info-value">${hospital.contact_phone || '—'}</div></div></div>
        <div class="info-row"><span class="info-icon">✉️</span><div><div class="info-label">Email</div><div class="info-value">${hospital.email || '—'}</div></div></div>
        <div class="info-row"><span class="info-icon">🕐</span><div><div class="info-label">Timings</div><div class="info-value">${hospital.open_time || '08:00'} – ${hospital.close_time || '20:00'}</div></div></div>
        <div class="info-row"><span class="info-icon">⏱️</span><div><div class="info-label">Avg Wait</div><div class="info-value">${hospital.avg_wait_mins || 15} minutes</div></div></div>
    `;

    const insurance = hospital.insurance || [];
    if (insurance.length) {
        document.getElementById('insurance-card').style.display = 'block';
        document.getElementById('insurance-list').innerHTML = insurance.map(i => `<span class="ins-tag">✓ ${i}</span>`).join('');
    }
}

async function loadDepartments() {
    const s    = getSession();
    const data = await callBMD('get-departments', { session_token: s.token || '', hospital_id: hospitalId });
    if (data.status !== 'SUCCESS') return;
    const pills = document.getElementById('dept-pills');
    (data.departments || []).forEach(d => {
        const pill            = document.createElement('div');
        pill.className        = 'dept-pill';
        pill.dataset.deptName = d.dept_name;
        pill.innerHTML        = `${d.dept_name} <span class="dept-count">${d.doctor_count}</span>`;
        pill.onclick          = () => filterByDept(d.dept_id, d.dept_name, pill);
        pills.appendChild(pill);
    });
}

async function loadDoctors() {
    const s    = getSession();
    const data = await callBMD('get-doctors', { session_token: s.token || '' });
    if (data.status !== 'SUCCESS') {
        document.getElementById('doctors-grid').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load doctors</div></div>`;
        return;
    }
    allDoctors = (data.doctors || []).filter(d =>
        hospitalData && (d.hospital_name || '').toLowerCase() === (hospitalData.hospital_name || '').toLowerCase()
    );
    renderDoctors(allDoctors);
}

function renderDoctors(doctors) {
    const grid  = document.getElementById('doctors-grid');
    const title = document.getElementById('doctors-title');
    title.textContent = `Available Doctors (${doctors.length})`;

    if (doctors.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">👨‍⚕️</div><div class="empty-title">No doctors found</div><div class="empty-sub">Try selecting a different department.</div></div>`;
        return;
    }

    grid.innerHTML = doctors.map(d => {
        const icon = d.gender === 'F' ? '👩‍⚕️' : '👨‍⚕️';
        return `
        <div class="doctor-card" onclick="bookDoctor(${d.doctor_id})">
            <div class="doctor-avatar">${icon}</div>
            <div class="doctor-info">
                <div class="doctor-name">${d.full_name}</div>
                <div class="doctor-spec">${d.specialization}</div>
                <div class="doctor-qual">${d.qualification || ''}</div>
                <div class="doctor-tags">
                    <span class="doctor-tag">🏬 ${d.dept_name || ''}</span>
                    ${d.experience_years ? `<span class="doctor-tag">📅 ${d.experience_years} yrs</span>` : ''}
                    <span class="avail-badge ${d.is_available_today === 'Y' ? 'yes' : 'no'}">
                        ${d.is_available_today === 'Y' ? '🟢 Available Today' : '🔴 Not Today'}
                    </span>
                </div>
            </div>
            <div class="doctor-right">
                <div class="doctor-rating">⭐ ${parseFloat(d.avg_rating||0).toFixed(1)} (${d.total_reviews||0})</div>
                <div class="doctor-fee">₹${d.consultation_fee || 0}<small>/visit</small></div>
                <br>
                <button class="btn-book" onclick="event.stopPropagation(); bookDoctor(${d.doctor_id})">Book Now</button>
            </div>
        </div>`;
    }).join('');
}

function filterByDept(deptId, deptName, pillEl) {
    document.querySelectorAll('.dept-pill').forEach(p => p.classList.remove('active'));
    if (pillEl) pillEl.classList.add('active');
    const filtered = deptName
        ? allDoctors.filter(d => (d.dept_name || '').toLowerCase() === deptName.toLowerCase())
        : allDoctors;
    renderDoctors(filtered);
}

function bookDoctor(doctorId) {
    const s = getSession();
    if (!s.token || s.userType !== 'PATIENT') {
        showToast('Please login as a patient to book', '#dc3545');
        setTimeout(() => window.location.href = 'patient/login.html', 1500);
        return;
    }
    window.location.href = 'patient/booking.html?doctor_id=' + doctorId;
}

async function init() {
    const params = new URLSearchParams(window.location.search);
    hospitalId   = params.get('hospital_id');
    if (!hospitalId) { window.location.href = 'index.html'; return; }
    renderNav();
    showLoader('Loading hospital...');
    await loadHospital();
    await Promise.all([loadDepartments(), loadDoctors()]);
    hideLoader();
}

init();
</script>
</body>
